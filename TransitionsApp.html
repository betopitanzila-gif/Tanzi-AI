<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFPG Simple Transition Tracker</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f5f7fb;color:#1f2937}
.header{background:#102a43;color:white;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{margin:0;font-size:22px} .sub{opacity:.8;font-size:13px;margin-top:3px}
.wrap{display:flex;min-height:calc(100vh - 72px)} .side{width:245px;background:white;border-right:1px solid #e5e7eb;padding:16px}
.side h3{margin:0 0 12px;font-size:14px;color:#4b5563;text-transform:uppercase;letter-spacing:.05em}
.tab{display:block;width:100%;text-align:left;border:0;background:#f3f4f6;margin:8px 0;padding:12px;border-radius:10px;cursor:pointer;font-size:15px}
.tab.active{background:#dbeafe;color:#1d4ed8;font-weight:700} .main{flex:1;padding:22px;overflow:auto}
.cards{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin-bottom:18px}
.card{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card .num{font-size:25px;font-weight:800;margin-top:6px} .card .label{font-size:13px;color:#6b7280}
.toolbar{display:flex;gap:10px;align-items:center;margin:12px 0 16px;flex-wrap:wrap}
button{border:0;border-radius:9px;padding:10px 13px;background:#2563eb;color:white;cursor:pointer;font-weight:600}
button.secondary{background:#e5e7eb;color:#374151} button.danger{background:#dc2626}
input,select,textarea{border:1px solid #d1d5db;border-radius:8px;padding:8px;width:100%;font:inherit;background:white}
.search{max-width:360px} table{width:100%;border-collapse:separate;border-spacing:0;background:white;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden}
th{background:#f9fafb;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#4b5563;padding:10px;border-bottom:1px solid #e5e7eb;white-space:nowrap}
td{padding:8px;border-bottom:1px solid #f1f5f9;vertical-align:top} tr:last-child td{border-bottom:0}
.provider{font-weight:700;min-width:190px} .wide{min-width:210px} .stage{min-width:180px}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:6px} .bar{height:100%;background:#2563eb}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;background:#eef2ff;color:#3730a3;margin-left:8px}
.small{font-size:12px;color:#6b7280} .modal{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex} .modalbox{background:white;border-radius:16px;padding:20px;max-width:760px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px} label{font-size:12px;font-weight:700;color:#4b5563} .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.empty{background:white;border:1px dashed #cbd5e1;border-radius:14px;padding:24px;text-align:center;color:#64748b}
@media(max-width:900px){.wrap{display:block}.side{width:100%;border-right:0;border-bottom:1px solid #e5e7eb}.cards{grid-template-columns:1fr 1fr} table{font-size:13px}}
</style>
</head>
<body>
<div class="header">
 <div><h1>AFPG Simple Transition Tracker</h1><div class="sub">Provider names are preloaded for Praescius, CPW and Chalmers. Update codes and stages as work progresses.</div></div>
 <div class="small" style="color:#cbd5e1">Auto-saves in this browser</div>
</div>
<div class="wrap">
 <aside class="side">
   <h3>Acquisitions</h3>
   <div id="tabs"></div>
   <button class="secondary" style="width:100%;margin-top:12px" onclick="resetData()">Reset to preloaded list</button>
 </aside>
 <main class="main">
   <h2 id="title" style="margin:0 0 4px"></h2>
   <div class="small" id="summaryText"></div>
   <div class="cards" id="cards"></div>
   <div class="toolbar">
     <button onclick="openAddModal()">+ Add Provider</button>
     <button class="secondary" onclick="exportCsv()">Export CSV</button>
     <input class="search" id="search" placeholder="Search provider, code or notes..." oninput="renderTable()">
   </div>
   <div id="tableWrap"></div>
 </main>
</div>

<div class="modal" id="modal">
 <div class="modalbox">
   <h2 style="margin-top:0">Add Provider</h2>
   <div class="grid">
     <div><label>Provider Name</label><input id="newProvider"></div>
     <div><label>Stage</label><select id="newStage"></select></div>
     <div><label>Old Dealer Code</label><input id="newOldDealer"></div>
     <div><label>Old Adviser Code(s)</label><input id="newOldAdviser"></div>
     <div><label>New Dealer Code</label><input id="newNewDealer"></div>
     <div><label>New Adviser / Corporate Code</label><input id="newNewAdviser"></div>
     <div><label>Owner</label><input id="newOwner"></div>
     <div><label>Staff Access</label><input id="newStaff"></div>
     <div style="grid-column:1/-1"><label>Notes</label><textarea id="newNotes" rows="3"></textarea></div>
   </div>
   <div class="actions">
     <button class="secondary" onclick="closeAddModal()">Cancel</button>
     <button onclick="addProvider()">Save Provider</button>
   </div>
 </div>
</div>

ser": "", "stage": "Not Started", "owner": "", "staffAccess": "", "notes": ""}]};
let current = 'Praescius';
let data = loadData();

function loadData(){
  try {
    const saved = localStorage.getItem('afpgSimpleTransitionTracker');
    if(saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData(){ localStorage.setItem('afpgSimpleTransitionTracker', JSON.stringify(data)); }

function stageIndex(stage){
  const idx = STAGES.indexOf(stage);
  return idx < 0 ? 0 : idx;
}
function progressFor(records){
  if(!records.length) return 0;
  const max = STAGES.length - 1;
  const total = records.reduce((sum,r)=>sum+stageIndex(r.stage),0);
  return Math.round((total/(records.length*max))*100);
}
function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = Object.keys(data).map(name => {
    const pct = progressFor(data[name]);
    return `<button class="tab ${name===current?'active':''}" onclick="selectAcquisition('${name}')">${name} <span class="badge">${data[name].length}</span><div class="progress"><div class="bar" style="width:${pct}%"></div></div></button>`;
  }).join('');
}
function selectAcquisition(name){ current=name; document.getElementById('search').value=''; render(); }
function renderCards(){
  const records = data[current] || [];
  const completed = records.filter(r=>r.stage==='Complete').length;
  const waiting = records.filter(r=>r.stage==='Waiting for New Codes' || r.stage==='Follow Up').length;
  const transfers = records.filter(r=>r.stage==='Client Transfers').length;
  const pct = progressFor(records);
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="label">Providers</div><div class="num">${records.length}</div></div>
    <div class="card"><div class="label">Completed</div><div class="num">${completed}</div></div>
    <div class="card"><div class="label">Waiting / Follow Up</div><div class="num">${waiting}</div></div>
    <div class="card"><div class="label">Progress</div><div class="num">${pct}%</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div>
  `;
  document.getElementById('summaryText').textContent = `${completed} completed, ${transfers} in client transfers, ${waiting} waiting/follow-up.`;
}
function renderTable(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  let records = data[current] || [];
  if(q) records = records.filter(r => Object.values(r).join(' ').toLowerCase().includes(q));
  const wrap = document.getElementById('tableWrap');
  if(!records.length){ wrap.innerHTML = '<div class="empty">No providers found. Use + Add Provider to add one.</div>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Provider</th><th>Old Dealer</th><th>Old Adviser Code(s)</th><th>New Dealer</th><th>New Adviser / Corporate Code</th><th>Stage</th><th>Owner</th><th>Staff Access</th><th>Notes</th><th></th>
    </tr></thead>
    <tbody>
      ${records.map(r=>rowHtml(r)).join('')}
    </tbody>
  </table>`;
}
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function rowHtml(r){
  const options = STAGES.map(s=>`<option value="${esc(s)}" ${r.stage===s?'selected':''}>${esc(s)}</option>`).join('');
  return `<tr>
    <td class="provider">${esc(r.provider)}</td>
    <td><input value="${esc(r.oldDealer)}" onchange="updateRec('${r.id}','oldDealer',this.value)"></td>
    <td class="wide"><textarea rows="2" onchange="updateRec('${r.id}','oldAdviser',this.value)">${esc(r.oldAdviser)}</textarea></td>
    <td><input value="${esc(r.newDealer)}" onchange="updateRec('${r.id}','newDealer',this.value)"></td>
    <td class="wide"><textarea rows="2" onchange="updateRec('${r.id}','newAdviser',this.value)">${esc(r.newAdviser)}</textarea></td>
    <td class="stage"><select onchange="updateRec('${r.id}','stage',this.value)">${options}</select></td>
    <td><input value="${esc(r.owner)}" onchange="updateRec('${r.id}','owner',this.value)"></td>
    <td><input value="${esc(r.staffAccess)}" onchange="updateRec('${r.id}','staffAccess',this.value)"></td>
    <td class="wide"><textarea rows="2" onchange="updateRec('${r.id}','notes',this.value)">${esc(r.notes)}</textarea></td>
    <td><button class="danger" onclick="deleteRec('${r.id}')">Delete</button></td>
  </tr>`;
}
function updateRec(id, field, value){
  const rec = (data[current]||[]).find(r=>r.id===id);
  if(rec){ rec[field]=value; saveData(); renderTabs(); renderCards(); }
}
function deleteRec(id){
  if(!confirm('Delete this provider?')) return;
  data[current] = data[current].filter(r=>r.id!==id);
  saveData(); render();
}
function openAddModal(){
  document.getElementById('modal').classList.add('show');
  const sel = document.getElementById('newStage');
  sel.innerHTML = STAGES.map(s=>`<option>${esc(s)}</option>`).join('');
  ['newProvider','newOldDealer','newOldAdviser','newNewDealer','newNewAdviser','newOwner','newStaff','newNotes'].forEach(id=>document.getElementById(id).value='');
}
function closeAddModal(){ document.getElementById('modal').classList.remove('show'); }
function addProvider(){
  const provider = document.getElementById('newProvider').value.trim();
  if(!provider){ alert('Please enter provider name.'); return; }
  const id = (current + '_' + provider + '_' + Date.now()).toLowerCase().replace(/\W+/g,'_');
  data[current].push({
    id, acquisition: current, provider,
    oldDealer: document.getElementById('newOldDealer').value.trim(),
    oldAdviser: document.getElementById('newOldAdviser').value.trim(),
    newDealer: document.getElementById('newNewDealer').value.trim(),
    newAdviser: document.getElementById('newNewAdviser').value.trim(),
    stage: document.getElementById('newStage').value,
    owner: document.getElementById('newOwner').value.trim(),
    staffAccess: document.getElementById('newStaff').value.trim(),
    notes: document.getElementById('newNotes').value.trim()
  });
  saveData(); closeAddModal(); render();
}
function resetData(){
  if(!confirm('Reset all saved changes and reload the preloaded provider lists?')) return;
  localStorage.removeItem('afpgSimpleTransitionTracker');
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  current = 'Praescius';
  render();
}
function exportCsv(){
  const rows = data[current];
  const headers = ['Acquisition','Provider','Old Dealer Code','Old Adviser Codes','New Dealer Code','New Adviser / Corporate Code','Stage','Owner','Staff Access','Notes'];
  const csv = [headers, ...rows.map(r=>[current,r.provider,r.oldDealer,r.oldAdviser,r.newDealer,r.newAdviser,r.stage,r.owner,r.staffAccess,r.notes])]
    .map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = current + '_provider_tracker.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}
function render(){
  document.getElementById('title').textContent = current;
  renderTabs(); renderCards(); renderTable();
}
render();
</script>
